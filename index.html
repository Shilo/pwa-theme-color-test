<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Theme Color and Color Scheme for Android Chrome
         The "color-scheme" meta tag ensures Chrome allows our custom dark theme color
         instead of forcing a pure black (#000000) status bar. 
         We use a SINGLE theme-color tag so JavaScript can dynamically change it without conflicts. -->
    <meta name="color-scheme" content="light dark">
    <meta id="themeColorMeta" name="theme-color" content="#282c34">

    <!-- iOS specific meta tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <title>PWA Theme Color Test</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #282c34;
            --text-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.2);
        }

        /* Light Theme Variable Overrides */
        body.light-theme {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: rgba(0, 0, 0, 0.2);
        }

        /* 
         * Setting background on html and body ensures that overscroll 
         * areas also appear with this color.
         */
        html,
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 
         * The main container utilizes env(safe-area-inset-*) to guarantee 
         * content avoids being under the status notch or navigation bar.
         */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding-top: env(safe-area-inset-top);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
        }

        .content {
            text-align: center;
            padding: 2rem;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            max-width: 90%;
            transition: border-color 0.3s ease;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-color);
            opacity: 0.8;
            transition: color 0.3s ease;
        }

        button {
            margin-top: 1.5rem;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--bg-color);
            background-color: var(--text-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.3s ease, color 0.3s ease;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content">
            <h1>Edge-to-Edge PWA - v8</h1>
            <p>This content respects the safe area insets.</p>
            <br>
            <p id="bgColorDisplay">Background: #282c34</p>
            <p>The system bars should blend cleanly.</p>
            <button id="themeToggleBtn">Toggle Theme</button>
        </div>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const bgColorDisplay = document.getElementById('bgColorDisplay');
        const themeColorMeta = document.getElementById('themeColorMeta');

        // Define our theme colors
        const darkColor = '#282c34';
        const lightColor = '#ffffff';

        let isDarkTheme = true;

        themeToggleBtn.addEventListener('click', () => {
            isDarkTheme = !isDarkTheme;

            // Toggle CSS class for styling the UI
            document.body.classList.toggle('light-theme', !isDarkTheme);

            // Set the new target hex color
            const targetColor = isDarkTheme ? darkColor : lightColor;

            // Update the display text for visual confirmation
            bgColorDisplay.textContent = `Background: ${targetColor}`;

            // Update the single meta tag dynamically
            if (themeColorMeta) {
                themeColorMeta.setAttribute('content', targetColor);
            }
        });
    </script>

    <!-- Minimal Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered with scope:', registration.scope);
                    })
                    .catch(error => {
                        console.error('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
