<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Theme Color — Status Bar Coloring

         Android (Chrome standalone PWA):
           - The meta theme-color controls the status bar color at runtime.
           - Dynamic updates require removing and re-inserting the meta tag;
             setAttribute() alone is ignored by Chrome in standalone mode.
           - CAVEAT: When the device is in system dark mode, Chrome forcibly
             overrides theme-color to pure black (#000000) regardless of what
             we set here. This is an open Chromium bug (since 2019)
             with no web-platform workaround.
             https://issues.chromium.org/issues/40634649

         iOS (Safari standalone PWA):
           - The "black-translucent" status bar style (below) makes the status
             bar transparent, so the body's background-color shows through.
             The theme-color meta tag is therefore secondary on iOS.
           - CAVEAT (iOS 26+): Safari ignores the theme-color meta tag entirely.
             It derives the bar color from the page's background-color automatically.
             This means dynamic JS updates to the meta tag have zero effect —
             but because black-translucent already makes the bar transparent,
             our CSS background-color change is all that's needed.

         Samsung Internet:
           - Fully supports meta theme-color including dynamic updates.
           - No known dark-mode override issue like Chrome.
           - Uses the Chromium engine but has its own UI chrome handling.

         Browser support for meta theme-color (https://caniuse.com/?search=meta+theme-color):
           - Chrome 145+ Android: Partial — does not apply the color on devices
             with native dark mode unless it's an installed PWA or TWA.
           - Safari/iOS 26.4+: "Supported" but does not actually use the color
             anywhere (transparent status bar via black-translucent still works).
           - Samsung Internet 29: Fully supported.

         color-scheme "light dark" tells the browser this page handles both
         schemes (affects scrollbars, form controls, etc.) but does NOT
         prevent Chrome's dark-mode status bar override. -->
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#282c34">

    <!-- iOS standalone PWA meta tags
         NOTE: apple-mobile-web-app-capable is deprecated in favor of the standard
         mobile-web-app-capable. However, removing the apple- prefix can break
         splash screen behavior on some iOS versions. We use the standard tag here
         and rely on the manifest's "display": "standalone" for installation.
         The apple-mobile-web-app-status-bar-style tag still requires the apple-
         prefix as there is no standard equivalent. -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <title>PWA Theme Color Test</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-color: #282c34;
            --text-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.2);
        }

        /* Light Theme Variable Overrides */
        body.light-theme {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: rgba(0, 0, 0, 0.2);
        }

        /* 
         * Setting background on html and body ensures that overscroll 
         * areas also appear with this color.
         */
        html,
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* 
         * The main container utilizes env(safe-area-inset-*) to guarantee 
         * content avoids being under the status notch or navigation bar.
         */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding-top: env(safe-area-inset-top);
            padding-right: env(safe-area-inset-right);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
        }

        .content {
            text-align: center;
            padding: 2rem;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            max-width: 90%;
            transition: border-color 0.3s ease;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-color);
            opacity: 0.8;
            transition: color 0.3s ease;
        }

        button {
            margin-top: 1.5rem;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--bg-color);
            background-color: var(--text-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.3s ease, color 0.3s ease;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content">
            <h1>Edge-to-Edge PWA - v11</h1>
            <p>This content respects the safe area insets.</p>
            <br>
            <p id="bgColorDisplay">Background: #282c34</p>
            <p>The system bars should blend cleanly.</p>
            <button id="themeToggleBtn">Toggle Theme</button>
        </div>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const bgColorDisplay = document.getElementById('bgColorDisplay');

        // Define our theme colors
        const darkColor = '#282c34';
        const lightColor = '#ffffff';

        let isDarkTheme = true;

        /**
         * Forces Chrome on Android to update the status bar color by removing
         * the old meta[name="theme-color"] and inserting a new one.
         * Chrome's standalone PWA mode does not reliably react to setAttribute()
         * on an existing element — a fresh DOM node is required.
         *
         * On iOS (black-translucent), the status bar is transparent and the body
         * background shows through, so this meta tag is mainly for Android.
         *
         * NOTE: Android dark mode limitation (Chromium bug #40634649, open since 2019):
         * When the device is in system dark mode, Chrome forcibly overrides
         * theme-color to black. No web-platform workaround exists.
         */
        function setBrowserThemeColor(color) {
            const existing = document.querySelector('meta[name="theme-color"]');
            if (existing) existing.remove();

            const meta = document.createElement('meta');
            meta.name = 'theme-color';
            meta.content = color;
            document.head.appendChild(meta);
        }

        themeToggleBtn.addEventListener('click', () => {
            isDarkTheme = !isDarkTheme;

            // Toggle CSS class for styling the UI
            document.body.classList.toggle('light-theme', !isDarkTheme);

            // Set the new target hex color
            const targetColor = isDarkTheme ? darkColor : lightColor;

            // Update the display text for visual confirmation
            bgColorDisplay.textContent = `Background: ${targetColor}`;

            // Replace the meta tag to force Android Chrome to update the status bar
            setBrowserThemeColor(targetColor);
        });
    </script>

    <!-- Minimal Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered with scope:', registration.scope);

                        // Force the browser to aggressively check for a new sw.js
                        // on the server, bypassing its own 24-hour check timer.
                        registration.update();

                        // If an update is found and installed, force a reload so the user
                        // immediately sees the newest version instead of the cached one.
                        registration.onupdatefound = () => {
                            const installingWorker = registration.installing;
                            if (installingWorker) {
                                installingWorker.onstatechange = () => {
                                    if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                        console.log('New content is available; please refresh.');
                                        window.location.reload();
                                    }
                                };
                            }
                        };
                    })
                    .catch(error => {
                        console.error('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>

</html>
